<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Quill architecture</title>
  <desc id="desc">The Quill web app connects through HTTP and WebSocket to a Go and Fiber API. A sequential analysis queue calls Qwen Cloud and reads and writes PostgreSQL with pgvector and Apache AGE. The memory service combines vector, graph, recency, keyword, and consolidated recall before applying a context budget.</desc>
  <defs>
    <style>
      .bg{fill:#101817}.card{fill:#182522;stroke:#5b9b8a;stroke-width:2}.qwen{fill:#2c2548;stroke:#a78bfa;stroke-width:2}.data{fill:#282218;stroke:#d5a94a;stroke-width:2}.memory{fill:#173033;stroke:#50b7ae;stroke-width:2}.t{font:600 20px system-ui,sans-serif;fill:#f7f3e8}.s{font:15px system-ui,sans-serif;fill:#d9ded7}.l{font:14px system-ui,sans-serif;fill:#bfc9c2}.a{stroke:#d9ded7;stroke-width:2;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path fill="#d9ded7" d="M 0 0 L 10 5 L 0 10 z"/></marker>
  </defs>
  <rect class="bg" width="1200" height="620" rx="20"/>
  <text class="t" x="56" y="58">Quill: persistent story memory for long-form fiction</text>
  <rect class="card" x="60" y="150" width="210" height="115" rx="14"/><text class="t" x="90" y="193">Writer</text><text class="s" x="90" y="222">Drafts and asks</text><text class="s" x="90" y="244">about their story world</text>
  <rect class="card" x="350" y="128" width="230" height="160" rx="14"/><text class="t" x="382" y="171">React frontend</text><text class="s" x="382" y="201">React + Vite + TipTap</text><text class="s" x="382" y="226">HTTP + WebSocket</text><text class="l" x="382" y="255">:3001 → backend</text>
  <rect class="card" x="660" y="128" width="230" height="160" rx="14"/><text class="t" x="693" y="171">Go / Fiber API</text><text class="s" x="693" y="201">WebSocket hub</text><text class="s" x="693" y="226">Per-work analysis queue</text><text class="l" x="693" y="255">:8080</text>
  <rect class="qwen" x="970" y="128" width="180" height="160" rx="14"/><text class="t" x="1003" y="171">Qwen Cloud</text><text class="s" x="1003" y="201">qwen-turbo</text><text class="s" x="1003" y="226">qwen-max</text><text class="s" x="1003" y="251">embeddings / rerank</text>
  <rect class="memory" x="435" y="380" width="355" height="175" rx="14"/><text class="t" x="466" y="423">Memory service</text><text class="s" x="466" y="454">Vector · graph · recency · keyword</text><text class="s" x="466" y="481">Consolidated recall → RRF fusion</text><text class="s" x="466" y="508">Relevance decay + context budget</text>
  <rect class="data" x="885" y="382" width="265" height="170" rx="14"/><text class="t" x="917" y="425">Persistent stores</text><text class="s" x="917" y="457">PostgreSQL 16</text><text class="s" x="917" y="484">pgvector embeddings</text><text class="s" x="917" y="511">Apache AGE story graph</text>
  <path class="a" d="M270 207H350"/><path class="a" d="M580 207H660"/><path class="a" d="M890 207H970"/><path class="a" d="M775 288V380"/><path class="a" d="M790 468H885"/><path class="a" d="M660 252 C590 300 560 325 560 380"/><path class="a" d="M975 289 C915 330 880 375 820 418"/>
  <text class="l" x="282" y="192">browser</text><text class="l" x="591" y="192">/api + WS</text><text class="l" x="896" y="192">API calls</text><text class="l" x="804" y="344">recall / writes</text>
</svg>
